  <style>
    :root {
      --bg-paper: #f6e7b5;
      --bg-paper-soft: #fbf2cf;
      --surface-solid: #fffdf7;
      --yellow: #f5c84c;
      --ink: #111111;
      --ink-soft: #5c5448;
      --line: rgba(17, 17, 17, 0.1);
      --shadow-soft: 0 10px 24px rgba(17, 17, 17, 0.06);
      --radius-lg: 22px;
      --radius-pill: 999px;
      --shell: 980px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at 1px 1px, rgba(17, 17, 17, 0.07) 1px, transparent 0) 0 0 / 16px 16px,
        linear-gradient(180deg, #faefcb 0%, var(--bg-paper) 100%);
    }
    .noise {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 255, 255, 0.34), transparent 24%),
        radial-gradient(circle at 78% 6%, rgba(255, 255, 255, 0.18), transparent 18%);
      pointer-events: none;
    }
    .shell {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--shell));
      margin: 0 auto;
    }
    header {
      padding: 22px 0 18px;
    }
    .brand {
      display: inline-flex;
      flex-direction: column;
      gap: 7px;
      text-decoration: none;
      color: inherit;
    }
    .brand__title {
      font-family: "Inter Tight", sans-serif;
      font-size: clamp(3rem, 4.6vw, 4.25rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-weight: 900;
    }
    .brand__tagline {
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }
    main {
      padding: 12px 0 48px;
    }
    .card {
      border-radius: 28px;
      background: var(--surface-solid);
      border: 1px solid rgba(17, 17, 17, 0.08);
      box-shadow: var(--shadow-soft);
      padding: clamp(24px, 4vw, 44px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: var(--radius-pill);
      background: var(--yellow);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 14px;
      font-family: "Inter Tight", sans-serif;
      font-size: clamp(2.7rem, 7vw, 5.1rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }
    p {
      margin: 0;
      color: var(--ink-soft);
      font-size: 1.04rem;
      line-height: 1.7;
      max-width: 60ch;
    }
    .actions,
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .button,
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--line);
      text-decoration: none;
      color: var(--ink);
      font-weight: 800;
      background: rgba(255, 255, 255, 0.66);
    }
    .button--primary {
      background: var(--yellow);
      border-color: transparent;
    }
    footer {
      padding-bottom: 28px;
      color: var(--ink-soft);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <header class="shell">
    <a class="brand" href="/" aria-label="SunWire home">
      <span class="brand__title">SUNWIRE</span>
      <span class="brand__tagline">Be the First to Know</span>
    </a>
  </header>
  <main class="shell">
    <section class="card">
      <span class="eyebrow">404 Error</span>
      <h1>Page not found</h1>
      <p>The page you requested is not available. Use the links below to get back to the current SunWire front page or jump straight into the main desks.</p>
      <div class="actions">
        <a class="button button--primary" href="/">Back to homepage</a>
        <a class="button" href="/">Latest news</a>
      </div>
      <div class="links" aria-label="News categories">
        <a class="chip" href="/?filter=ai">AI</a>
        <a class="chip" href="/?filter=tech">Tech</a>
        <a class="chip" href="/?filter=entertainment">Entertainment</a>
        <a class="chip" href="/?filter=sports">Sports</a>
        <a class="chip" href="/?filter=business">Business</a>
      </div>
    </section>
  </main>
  <footer class="shell">sunwire.in</footer>
</body>
</html>
