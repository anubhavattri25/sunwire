name: Sunwire News Pipeline

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run news pipeline
        run: node sunwire/backend/services/journalisticPipeline.js
