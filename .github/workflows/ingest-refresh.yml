name: Sunwire News Ingestion

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Trigger Sunwire ingestion
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          CATEGORIES=(
            general
            ai
            tech
            entertainment
            sports
            business
            politics
            jobs
            food
          )

          for CATEGORY in "${CATEGORIES[@]}"; do
            echo "Calling Sunwire ingestion endpoint for category: ${CATEGORY}"
            RESPONSE_FILE="response-${CATEGORY}.txt"

            STATUS=$(curl -sS \
              --connect-timeout 10 \
              --max-time 90 \
              --retry 2 \
              --retry-delay 3 \
              -o "${RESPONSE_FILE}" \
              -w "%{http_code}" \
              -X POST \
              -H "Cache-Control: no-cache" \
              -H "x-ingest-key: ${INGEST_SECRET}" \
              -H "User-Agent: SunwireBot/1.0" \
              "https://sunwire.in/api/ingest?categories=${CATEGORY}&rssLimit=1")

            echo "Category: ${CATEGORY}"
            echo "HTTP Status: ${STATUS}"
            echo "Response:"
            cat "${RESPONSE_FILE}" || true

            if [ "${STATUS}" != "200" ] && [ "${STATUS}" != "202" ]; then
              echo "Ingestion failed for category: ${CATEGORY}"
              exit 1
            fi
          done

          echo "Sunwire pipeline triggered successfully for all categories"
