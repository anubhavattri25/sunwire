name: Sunwire News Ingestion

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Sunwire ingestion
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          echo "Calling Sunwire ingestion endpoint..."

          STATUS=$(curl -sS \
            --connect-timeout 10 \
            --max-time 60 \
            -o response.txt \
            -w "%{http_code}" \
            -X POST \
            -H "Cache-Control: no-cache" \
            -H "x-ingest-key: ${INGEST_SECRET}" \
            -H "User-Agent: SunwireBot/1.0" \
            "https://sunwire.in/api/ingest")

          echo "HTTP Status: $STATUS"
          echo "Response:"
          cat response.txt || true

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "Ingestion failed"
            exit 1
          else
            echo "Sunwire pipeline triggered successfully"
          fi
