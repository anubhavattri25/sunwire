name: Sunwire News Ingestion

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Sunwire ingestion
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          echo "🚀 Calling Sunwire ingestion endpoint..."

          URL="https://sunwire.in/api/ingest?key=${INGEST_SECRET}"

          STATUS=$(curl -sS \
            --connect-timeout 10 \
            --max-time 60 \
            -o response.txt \
            -w "%{http_code}" \
            -H "Cache-Control: no-cache" \
            -H "User-Agent: SunwireBot/1.0" \
            "$URL")

          echo "HTTP Status: $STATUS"
          echo "Response:"
          cat response.txt || true

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "❌ Ingestion failed"
            exit 1
          else
            echo "✅ Sunwire pipeline triggered successfully"
          fi